<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR TOOLBOX | 登录</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --bg-panel: #111827;
            --cyan-glow: #06b6d4;
            --cyan-dim: rgba(6, 182, 212, 0.15);
            --red-alert: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .login-card {
            width: 360px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .login-card h1 { font-size: 1.5rem; font-weight: 800; color: var(--cyan-glow); letter-spacing: 1px; text-align: center; }
        .login-card .subtitle { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin: 0.5rem 0 2rem; }

        .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .form-group input { width: 100%; padding: 0.7rem 1rem; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 6px; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: var(--cyan-glow); }

        .btn-login { width: 100%; background: var(--cyan-glow); color: var(--bg-dark); border: none; padding: 0.8rem; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; transition: transform 0.15s; }
        .btn-login:hover { transform: translateY(-2px); }

        .error-msg { background: rgba(239, 68, 68, 0.12); border: 1px solid var(--red-alert); color: var(--red-alert); padding: 0.7rem 1rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1.2rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>STAR TOOLBOX</h1>
        <p class="subtitle">控制台登录</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
    </div>
</body>
</html>
